name: E2E SEO API integration

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'GeekSeoBackend/**'
      - 'GeekSeo.Application/**'
      - '.github/workflows/e2e-seo-api-integration.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'GeekSeoBackend/**'
      - 'GeekSeo.Application/**'
      - '.github/workflows/e2e-seo-api-integration.yml'
  workflow_dispatch:

jobs:
  seo-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for GeekSeoBackend production deploy
        run: |
          url="https://geekseobackend-production.up.railway.app/api/seo/plagiarism/status"
          for attempt in $(seq 1 24); do
            code="$(curl -s -o /dev/null -w '%{http_code}' \
              -H 'X-User-Id: 00000000-0000-0000-0000-000000000001' \
              "$url")"
            if [ "$code" = "200" ]; then
              echo "GeekSeoBackend ready (attempt $attempt)"
              exit 0
            fi
            echo "attempt $attempt: plagiarism/status => $code (waiting 10s)"
            sleep 10
          done
          echo "GeekSeoBackend not ready after 4 minutes"
          exit 1

      - name: Plagiarism API integration (production, status only)
        run: npm run test:integration:plagiarism
        env:
          PLAYWRIGHT_API_URL: https://geekseobackend-production.up.railway.app
          NEXT_PUBLIC_DEV_USER_ID: 00000000-0000-0000-0000-000000000001

      - name: Site audit API integration (production, tier gate)
        run: npm run test:integration:site-audit
        env:
          PLAYWRIGHT_API_URL: https://geekseobackend-production.up.railway.app
          NEXT_PUBLIC_DEV_USER_ID: 00000000-0000-0000-0000-000000000001

      - name: Content Guard API integration (production, tier gate + 401)
        run: npm run test:integration:content-guard
        env:
          PLAYWRIGHT_API_URL: https://seo-api.geekatyourspot.com
          NEXT_PUBLIC_DEV_USER_ID: 00000000-0000-0000-0000-000000000001

      - name: SUL provider config (production, no vendor spend)
        run: npm run test:integration:sul-providers
        env:
          PLAYWRIGHT_API_URL: https://seo-api.geekatyourspot.com
          INTEGRATION_USER_ID: 92b274f5-2fcb-4935-ba2d-cd8c03e1b21b

      - name: GA4 API integration (production, live landing-pages)
        run: GA4_LIVE=1 npm run test:integration:ga4
        env:
          PLAYWRIGHT_API_URL: https://seo-api.geekatyourspot.com
          INTEGRATION_USER_ID: 92b274f5-2fcb-4935-ba2d-cd8c03e1b21b
          GA4_PROJECT_ID: 073892ed-a6ce-4b4b-b37a-864126481823
