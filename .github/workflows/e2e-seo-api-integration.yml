name: E2E SEO API integration

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'GeekSeoBackend/**'
      - 'GeekSeo.Application/**'
      - '.github/workflows/e2e-seo-api-integration.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'GeekSeoBackend/**'
      - 'GeekSeo.Application/**'
      - '.github/workflows/e2e-seo-api-integration.yml'
  workflow_dispatch:

jobs:
  plagiarism-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Plagiarism API integration (production, status only)
        run: npm run test:integration:plagiarism
        env:
          PLAYWRIGHT_API_URL: https://geekseobackend-production.up.railway.app
          NEXT_PUBLIC_DEV_USER_ID: 00000000-0000-0000-0000-000000000001

      - name: Site audit API integration (production, tier gate)
        run: npm run test:integration:site-audit
        env:
          PLAYWRIGHT_API_URL: https://geekseobackend-production.up.railway.app
          NEXT_PUBLIC_DEV_USER_ID: 00000000-0000-0000-0000-000000000001
