name: E2E authenticated (Playwright)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1'

jobs:
  authenticated:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Authenticated tests
        run: npm run test:e2e:auth
        env:
          PLAYWRIGHT_BASE_URL: https://seo.geekatyourspot.com
          PLAYWRIGHT_API_URL: https://geekseobackend-production.up.railway.app
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-authenticated
          path: frontend/playwright-report/
          retention-days: 7
