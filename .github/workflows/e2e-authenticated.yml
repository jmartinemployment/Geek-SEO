name: E2E authenticated (Playwright)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1'

jobs:
  authenticated:
    runs-on: ubuntu-latest
    steps:
      - name: Check credentials configured
        id: creds
        run: |
          if [ -n "${{ secrets.PLAYWRIGHT_TEST_EMAIL }}" ] && [ -n "${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: set PLAYWRIGHT_TEST_EMAIL and PLAYWRIGHT_TEST_PASSWORD (see scripts/E2E_PLAYWRIGHT.md)"
          fi

      - uses: actions/checkout@v4
        if: steps.creds.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.creds.outputs.configured == 'true'
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.creds.outputs.configured == 'true'
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.creds.outputs.configured == 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Authenticated tests
        if: steps.creds.outputs.configured == 'true'
        working-directory: frontend
        run: npm run test:e2e:auth -- --project=authenticated
        env:
          PLAYWRIGHT_BASE_URL: https://seo.geekatyourspot.com
          PLAYWRIGHT_API_URL: https://geekseobackend-production.up.railway.app
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}

      - name: Upload Playwright report on failure
        if: failure() && steps.creds.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-authenticated
          path: frontend/playwright-report/
          retention-days: 7
