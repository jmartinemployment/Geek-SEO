name: E2E Google integration (API)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'GeekSeoBackend/**'
      - '.github/workflows/e2e-google-integration.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'GeekSeoBackend/**'
      - '.github/workflows/e2e-google-integration.yml'
  workflow_dispatch:

jobs:
  google-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Google GSC/GA4 API integration (production)
        run: npm run test:integration:google
        env:
          PLAYWRIGHT_API_URL: https://geekseobackend-production.up.railway.app
          NEXT_PUBLIC_DEV_USER_ID: 00000000-0000-0000-0000-000000000001
