# DEPRECATED — Content Writer is hosted inside GeekSeoBackend.
# Kept for local docker builds only: docker build -f content-writer/Dockerfile .
[build]
builder = "DOCKERFILE"
dockerfilePath = "content-writer/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
