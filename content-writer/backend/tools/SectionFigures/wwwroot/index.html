<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SectionFigures</title>
  <style>
    :root { font-family: system-ui, sans-serif; color: #111; background: #f6f6f4; }
    body { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
    h1 { font-size: 1.4rem; margin: 0 0 0.25rem; }
    .sub { color: #555; margin-bottom: 1.25rem; }
    .panel { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    label { display: block; font-weight: 600; margin-bottom: 0.35rem; }
    input[type=text] { width: 100%; box-sizing: border-box; padding: 0.5rem; font: inherit; }
    .row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; margin-top: 0.75rem; }
    button { padding: 0.5rem 1rem; font: inherit; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .badges span { display: inline-block; margin-right: 0.75rem; font-size: 0.9rem; }
    .ok { color: #0a7; } .bad { color: #c33; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { text-align: left; padding: 0.35rem 0.5rem; border-bottom: 1px solid #eee; }
    #log { font-family: ui-monospace, monospace; font-size: 0.8rem; max-height: 200px; overflow: auto; background: #111; color: #ddd; padding: 0.75rem; border-radius: 6px; white-space: pre-wrap; }
    .stats { display: flex; gap: 1rem; flex-wrap: wrap; margin: 0.5rem 0; }
    .err { color: #c33; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>SectionFigures</h1>
  <p class="sub">Batch section art → AVIF on disk. Content Writer supplies briefs only.</p>

  <div class="panel">
    <div class="badges" id="env"></div>
    <p id="outputDir"></p>
  </div>

  <div class="panel">
    <label for="projectId">Content Writer project ID</label>
    <input id="projectId" type="text" placeholder="3ab80a4b-2427-45e3-88b4-d871b9d977c8" />
    <div class="row">
      <button id="exportBtn">Export &amp; plan</button>
      <span id="planSummary"></span>
    </div>
    <p class="err" id="exportErr"></p>
  </div>

  <div class="panel" id="planPanel" hidden>
    <div class="stats" id="stats"></div>
    <div class="row">
      <label><input type="checkbox" id="force" /> Force overwrite existing</label>
      <button id="generateBtn" disabled>Generate batch</button>
    </div>
    <p class="err" id="genErr"></p>
    <div id="progress" hidden>
      <p id="progressText"></p>
      <pre id="log"></pre>
    </div>
    <div style="max-height: 320px; overflow: auto; margin-top: 0.75rem;">
      <table><thead><tr><th>Path</th><th>Section</th><th>Disk</th></tr></thead><tbody id="rows"></tbody></table>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let pollTimer = null;

    async function loadStatus() {
      const s = await fetch('/api/status').then(r => r.json());
      $('env').innerHTML = [
        ['CW API', s.contentWriterApiConfigured],
        ['CW key', s.contentWriterKeyConfigured],
        ['OpenAI', s.openAiConfigured],
      ].map(([n, ok]) => `<span class="${ok ? 'ok' : 'bad'}">${n}: ${ok ? '✓' : '✗'}</span>`).join('');
      $('outputDir').textContent = 'Output: ' + (s.outputDir || '(not set)');
    }

    function showPlan(data) {
      $('planPanel').hidden = false;
      const sum = data.summary;
      $('planSummary').textContent = `${sum.totalJobs} jobs · ${sum.toGenerate} to generate · ~$${sum.estimatedCostUsd.toFixed(2)}`;
      $('stats').innerHTML = `<span>Total: ${sum.totalJobs}</span><span>On disk: ${sum.alreadyOnDisk}</span><span>To generate: ${sum.toGenerate}</span><span>Model: ${sum.model}</span>`;
      $('rows').innerHTML = data.rows.map(r => `<tr><td>${r.relativePath}</td><td>${r.heading}</td><td>${r.existsOnDisk ? 'exists' : 'generate'}</td></tr>`).join('');
      $('generateBtn').disabled = sum.toGenerate === 0 && !$('force').checked;
    }

    $('exportBtn').onclick = async () => {
      $('exportErr').textContent = '';
      const projectId = $('projectId').value.trim();
      const res = await fetch('/api/export', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ projectId }) });
      const data = await res.json();
      if (!res.ok) { $('exportErr').textContent = data.error || res.statusText; return; }
      showPlan(data);
    };

    async function pollStatus() {
      const st = await fetch('/api/generate/status').then(r => r.json());
      $('progress').hidden = false;
      $('progressText').textContent = `${st.phase} — ok ${st.succeeded} · skip ${st.skippedExists} · fail ${st.failed}${st.currentRelativePath ? ' · ' + st.currentRelativePath : ''}`;
      $('log').textContent = (st.logLines || []).join('\n');
      if (st.phase === 'Running') pollTimer = setTimeout(pollStatus, 800);
      else {
        $('generateBtn').disabled = false;
        const plan = await fetch('/api/plan').then(r => r.json());
        if (plan.summary) showPlan(plan);
      }
    }

    $('generateBtn').onclick = async () => {
      $('genErr').textContent = '';
      $('generateBtn').disabled = true;
      let body = { confirmed: false, force: $('force').checked, concurrency: 4, failFast: false };
      let res = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      let data = await res.json();
      if (res.status === 400 && data.requiresConfirmation) {
        if (!confirm(`Generate ${data.toGenerate} images (~$${data.estimatedCostUsd.toFixed(2)})?`)) {
          $('generateBtn').disabled = false;
          return;
        }
        body.confirmed = true;
        res = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        data = await res.json();
      }
      if (!res.ok) {
        $('genErr').textContent = data.error || res.statusText;
        $('generateBtn').disabled = false;
        return;
      }
      pollStatus();
    };

    loadStatus();
  </script>
</body>
</html>
